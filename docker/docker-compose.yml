version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: haystack-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - haystack-network
    restart: unless-stopped

networks:
  haystack-network:
    driver: bridge
